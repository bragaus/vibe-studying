services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DEBUG: "False"
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PUBLIC_API_HOST: ${API_DOMAIN}
      PUBLIC_API_ORIGIN: https://${API_DOMAIN}
      PUBLIC_WEB_URL: https://${WEB_DOMAIN}
      RUNTIME_ENVIRONMENT: production
      USE_X_FORWARDED_HOST: "True"
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "${GUNICORN_WORKERS:-3}",
        "--timeout",
        "${GUNICORN_TIMEOUT:-120}"
      ]
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8000), 2); s.close()\" >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DEBUG: "False"
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PUBLIC_API_HOST: ${API_DOMAIN}
      PUBLIC_API_ORIGIN: https://${API_DOMAIN}
      PUBLIC_WEB_URL: https://${WEB_DOMAIN}
      RUNTIME_ENVIRONMENT: production
      USE_X_FORWARDED_HOST: "True"
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DEBUG: "False"
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PUBLIC_API_HOST: ${API_DOMAIN}
      PUBLIC_API_ORIGIN: https://${API_DOMAIN}
      PUBLIC_WEB_URL: https://${WEB_DOMAIN}
      RUNTIME_ENVIRONMENT: production
      USE_X_FORWARDED_HOST: "True"
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}/api
        NEXT_PUBLIC_ANDROID_APP_URL: ${NEXT_PUBLIC_ANDROID_APP_URL:-}
        NEXT_PUBLIC_FLUTTER_ANDROID_URL: ${NEXT_PUBLIC_FLUTTER_ANDROID_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/vibestudying.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - staticfiles:/var/www/backend-static:ro
      - media:/var/www/backend-media:ro

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  media:
