map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name vibestudying.com.br backendvibestudying.planoartistico.com.br;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vibestudying.com.br;

    ssl_certificate /etc/letsencrypt/live/vibestudying.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibestudying.com.br/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $frontend_upstream frontend:3000;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backendvibestudying.planoartistico.com.br;

    ssl_certificate /etc/letsencrypt/live/backendvibestudying.planoartistico.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backendvibestudying.planoartistico.com.br/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $backend_upstream backend:8000;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 25m;

    location /static/ {
        alias /var/www/backend-static/;
        access_log off;
        expires 1d;
    }

    location /media/ {
        alias /var/www/backend-media/;
        access_log off;
        expires 1d;
    }

    location / {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
