version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vibe_studying
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    environment:
      DEBUG: 'True'
      SECRET_KEY: change-me
      ALLOWED_HOSTS: backendvibestudying.planoartistico.com,localhost,127.0.0.1
      CORS_ALLOW_ALL_ORIGINS: 'True'
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_TRUSTED_ORIGINS: https://backendvibestudying.planoartistico.com,http://localhost:8080,http://127.0.0.1:8080
      DATABASE_NAME: vibe_studying
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: '5432'
      JWT_SECRET_KEY: change-me-too
      ENABLE_PUBLIC_TEACHER_SIGNUP: 'True'
      USE_X_FORWARDED_HOST: 'True'
      PUBLIC_WEB_URL: https://vibestudying.app
      RUNTIME_ENVIRONMENT: docker
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      ALERT_EMAIL_RECIPIENTS: ops@example.com
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'

  worker:
    build:
      context: ./backend
    command: celery -A config worker -l info
    environment:
      DEBUG: 'True'
      SECRET_KEY: change-me
      ALLOWED_HOSTS: backendvibestudying.planoartistico.com,localhost,127.0.0.1
      CORS_ALLOW_ALL_ORIGINS: 'True'
      DATABASE_NAME: vibe_studying
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: '5432'
      JWT_SECRET_KEY: change-me-too
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      PUBLIC_WEB_URL: https://vibestudying.app
      RUNTIME_ENVIRONMENT: docker
      ALERT_EMAIL_RECIPIENTS: ops@example.com
    depends_on:
      - db
      - redis

  beat:
    build:
      context: ./backend
    command: celery -A config beat -l info
    environment:
      DEBUG: 'True'
      SECRET_KEY: change-me
      ALLOWED_HOSTS: backendvibestudying.planoartistico.com,localhost,127.0.0.1
      CORS_ALLOW_ALL_ORIGINS: 'True'
      DATABASE_NAME: vibe_studying
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: '5432'
      JWT_SECRET_KEY: change-me-too
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      PUBLIC_WEB_URL: https://vibestudying.app
      RUNTIME_ENVIRONMENT: docker
      ALERT_EMAIL_RECIPIENTS: ops@example.com
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://backendvibestudying.planoartistico.com/api}
        VITE_ANDROID_APP_URL: ''
        VITE_FLUTTER_ANDROID_URL: ''
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres_data:
