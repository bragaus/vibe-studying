services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-vibe_studying}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-change-me-local}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-too}
      PUBLIC_API_HOST: 127.0.0.1
      PUBLIC_API_ORIGIN: http://127.0.0.1:8080
      ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DATABASE_NAME: ${DATABASE_NAME:-vibe_studying}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      ENABLE_PUBLIC_TEACHER_SIGNUP: "True"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@vibestudying.local}
      SERVER_EMAIL: ${SERVER_EMAIL:-noreply@vibestudying.local}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-10}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      PUBLIC_WEB_URL: http://127.0.0.1:8080
      RUNTIME_ENVIRONMENT: docker-local
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TURNSTILE_ENABLED: "False"
      USE_X_FORWARDED_HOST: "True"
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "3",
        "--timeout",
        "120"
      ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8000), 2); s.close()\" >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-change-me-local}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-too}
      PUBLIC_API_HOST: 127.0.0.1
      PUBLIC_API_ORIGIN: http://127.0.0.1:8080
      ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      DATABASE_NAME: ${DATABASE_NAME:-vibe_studying}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@vibestudying.local}
      SERVER_EMAIL: ${SERVER_EMAIL:-noreply@vibestudying.local}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-10}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      PUBLIC_WEB_URL: http://127.0.0.1:8080
      RUNTIME_ENVIRONMENT: docker-local
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TURNSTILE_ENABLED: "False"
      USE_X_FORWARDED_HOST: "True"
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-change-me-local}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-too}
      PUBLIC_API_HOST: 127.0.0.1
      PUBLIC_API_ORIGIN: http://127.0.0.1:8080
      ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      DATABASE_NAME: ${DATABASE_NAME:-vibe_studying}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@vibestudying.local}
      SERVER_EMAIL: ${SERVER_EMAIL:-noreply@vibestudying.local}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-10}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      PUBLIC_WEB_URL: http://127.0.0.1:8080
      RUNTIME_ENVIRONMENT: docker-local
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TURNSTILE_ENABLED: "False"
      USE_X_FORWARDED_HOST: "True"
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_ANDROID_APP_URL: ${NEXT_PUBLIC_ANDROID_APP_URL:-}
        NEXT_PUBLIC_FLUTTER_ANDROID_URL: ${NEXT_PUBLIC_FLUTTER_ANDROID_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/var/www/backend-static:ro
      - media:/var/www/backend-media:ro

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  media:
